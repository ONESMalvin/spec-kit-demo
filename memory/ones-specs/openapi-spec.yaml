        '404':
          description: Returned if the resource object was not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadResponse404'
        '500':
          description: Internal Server Error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadResponse500'
    post:
      tags:
        - issue-attachment
      summary: Upload a file to the issue
      operationId: 02-upload-a-file-to-the-issue
      description: |
        Upload a file to the issue.

        :::caution

          The attachment upload only supports local storage, and does not support methods such as Qiniu, S3, etc.

        :::

        ## History

        | Version   |   Changes |
        | :-------- | :-------- |
        | v3.14.117, v3.15.26  | Added in: v3.14.117, v3.15.26 |
      security:
        - oauth2:
            - write:project:issue-attachment
      parameters:
        - name: teamID
          in: query
          description: The team ID
          required: true
          schema:
            type: string
        - name: issueID
          in: path
          description: The issue ID
          required: true
          schema:
            type: string
      requestBody:
        content:
          multipart/form-data:
            schema:
              required:
                - file
                - name
              properties:
                name:
                  maxLength: 64
                  type: string
                  description: The name of file
                description:
                  maxLength: 64
                  type: string
                  description: The description of file
                file:
                  type: string
                  description: The file to upload
                  format: binary
        required: true
      responses:
        '200':
          description: Request is successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddIssueAttachmentResponse'
        '401':
          description: Returned if the authentication credentials are incorrect or missing.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadResponse401'
