  /openapi/v3alpha/onesql/query:
    post:
      tags:
        - onesql
      summary: Execute ONESQL query
      operationId: execute-onesql
      description: |
        **ONESQL Overview**

        - ONESQL is a structured query language for ONES work item data, with syntax similar to SQL, capable of expressing complex conditional logic.

        - Statements consist of fields, operators, values/functions, combined through keywords like AND, OR, NOT; it's recommended to add parentheses for complex logic to ensure consistent results.

        - Supports comparison of multiple field types including numeric, text, member, date, etc., and can combine time/member functions to generate dynamic conditions.


        **Operator Reference**


        | Type | Operators | Description | Examples |
        | --- | --- | --- | --- |
        | Comparison | `<` `<=` `>` `>=` `==` `!=` | Compare between numeric/date/time/select/work item/member/text; `==`, `!=` only accept single values | `Due Date < "2008/12/31 09:00"`  `Assignee != currentUser()` |
        | Set | `IN` `NOT IN` | Whether field value exists in enumerated set, supports numeric/date/time/select/work item/member | `Priority IN (P0, P1)`  `Assignee NOT IN (John, Jane)` |
        | Null | `IS` `IS NOT` | Check if numeric/date/time/select/work item/member/file/text fields are empty | `Related Release IS EMPTY`  `Sprint IS NOT EMPTY` |
        | Text Match | `~` `!~` | Text field fuzzy contains or excludes specified string | `Title ~ "Project Management"`  `Description !~ "Closed"` |


        **Common Functions**

        | Scenario | Function | Parameters | Overview | Examples |
        | --- | --- | --- | --- | --- |
        | Time Point | `now(offset)` | `(+/-)nn(y/M/w/d/h/m)`, default `+` and day | Current time plus/minus offset | `Created Time > now(-1d)` |
        | Start Time | `StartOfDay/Week/Month/Year(offset)` | Same as above, default units are day, week, month, year | Calculate start moment of corresponding time unit then offset | `Created Date > StartOfWeek(-1)` |
        | End Time | `EndOfDay/Week/Month/Year(offset)` | Same as above | Calculate end moment of corresponding time unit then offset | `Due Date < EndOfMonth(+15d)` |
        | Member Set | `DepartmentOf(names)` | Department name list | Return members of each department | `Assignee IN DepartmentOf(Product, Development)` |
        | Member Set | `GroupOf(names)` | User group name list | Return members of each user group | `Assignee IN GroupOf(Testing)` |
        | Member Set | `RolesOf(names)` | Role name list | Return members of each role | `Assignee IN RolesOf(CDT Team)` |
        | Current User | `currentUser()` | None | Current logged-in user | `Assignee == currentUser()` |
        | Hierarchy Property | `expand(values)` | Node value list | Expand single/multi-select cascade or module properties to child nodes | `Location IN expand(Jiangsu, Zhejiang)` |


        **Keywords and Syntax Rules**

        - Logic keywords: `AND` (and), `OR` (or), `NOT` (not), `EMPTY` (null check), case insensitive.

        - Default priority is parentheses > `AND` > `OR`, recommend using parentheses for clear grouping.

        - Text constants need quotes (single/double both work); time function parameters don't need quotes.

        - Date fields support `yyyy/MM/dd HH:mm`, `yyyy-MM-dd HH:mm`, `yyyy/MM/dd`, `yyyy-MM-dd` formats; interval fields support `(+/-)XdYhZm`.


        **Common Query Fragments**

        - Current user's incomplete tasks: `uid(field004) == currentUser() AND uid(field_status) != uid('status_done_uuid')`

        - Defects created last week: `uid(field_issue_type) == uid('defect_uuid') AND uid(field013) > StartOfWeek(-1) AND uid(field013) < StartOfWeek()`

        - Specific department assignee: `uid(field004) IN DepartmentOf(uid('department_uuid'))`

        - Due before 15th of next month: `uid(field010) < EndOfMonth(+15d)`
          (Example `field_status`, `field_issue_type`, `defect_uuid` etc. need to be replaced with actual field or option UUIDs.)

        **OpenAPI Query Points**

        - Execute statements through `POST /onesql/query`, need to explicitly specify data source (like `FROM issue`), `LIMIT offset, size`, `ORDER BY`, `GROUP BY` clauses are consistent with standard ONESQL semantics.

        - When accessing fields and sub-properties use `uid(fieldUUID[.subField])`, constant UUIDs written as `uid('xxx')`; placeholders `$1`, `$2` etc. assigned in `variables` array.

        - Pagination uses `v$cursor` comparison operations (like `v$cursor > ''`) with `limit`; set conditions can mix `currentUser()`, `DepartmentOf()`, `RolesOf()` and other functions.


        **Common Virtual Fields (v$ prefix)**


        | Field | Description | Deferred |
        | --- | --- | --- |
        | `v$path` | Returns hierarchy path, equals own UUID when hierarchy not enabled | No |
        | `v$sub_workitem_count` | Current node's downstream count | No |
        | `v$list_pin_field` | List pin information | No |
        | `v$progress_editable` | Whether progress is editable | No |
        | `v$has_view_manhour_tab` | Whether to show manhour tab | No |
        | `v$sub_workitem_done_count` | Downstream completed count, depends on `v$path` | Yes |
        | `v$issue_path` | Single work item complete path (including parent info) | No |


        **OpenAPI Example**

        ```sql
        select
          uid(uuid, uuid as path, field001 as summary,
              field007.uuid, field007.name,
              field005.name, field005.category,
              v$list_pin_field as list_pin_field,
              v$has_view_manhour_tab as has_manhour_tab,
              v$sub_workitem_count as downstream_task_count,
              v$sub_workitem_done_count as downstream_task_done_count)
        from issue

        where uid(3nfzBs64) in (uid('VU8KxHBr'))
          and uid(field004) in (currentUser())
          and v$cursor > ''
        order by field009 desc

        limit 1000, 50
        ```
      parameters:
        - name: teamID
          in: query
          description: The team ID
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                query:
                  type: string
                  description: ONESQL query, supports parameterization
                variables:
                  type: array
                  items:
                    nullable: true
                    oneOf:
                      - type: string
                      - type: integer
                      - type: boolean
                      - type: array
                      - type: object
                      - type: number
                  description: Parameterized variable value list
                hierarchy:
                  description: Hierarchy relationship configuration
                  $ref: '#/components/schemas/Hierarchy'
            example:
              query: select uid(field004) from issue
      responses:
        '200':
          description: Request successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ONESQLResponseData'
                    title: Query results
                  page_info:
                    title: Pagination information
                    $ref: '#/components/schemas/PageInfo'
                required:
                  - data
                  - page_info
        '401':
          description: Returned if the authentication credentials are incorrect or missing.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadResponse401'
        '403':
          description: Returns if the scope check fails.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadResponse403'
        '404':
          description: Returned if the resource object was not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadResponse404'
        '500':
          description: Internal Server Error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadResponse500'
      security:
        - oauth2:
            - read:onesql:query
