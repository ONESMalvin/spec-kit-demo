        - name: taskID
          in: path
          required: true
          description: Task ID
          schema:
            type: string
      responses:
        '200':
          description: Get successfully
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '401':
          description: Returned if the authentication credentials are incorrect or missing.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadResponse401'
        '403':
          description: Returns if the scope check fails.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadResponse403'
        '404':
          description: Returned if the resource object was not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadResponse404'
        '500':
          description: Internal Server Error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadResponse500'
  /openapi/v2/wiki/ask:
    post:
      tags:
        - copilot
      summary: Ask questions to Copilot
      operationId: 01-copilot-ask
      description: |
        ## History

        | Version   |   Changes |
        | :-------- | :-------- |
        | v6.35.0  | Added in: v6.35.0 |
      security:
        - oauth2:
            - read:wiki:page
      parameters:
        - name: teamID
          in: query
          description: The team ID
          required: true
          schema:
            type: string
        - name: requestUserID
          in: query
          description: User ID, this parameter can only be passed when calling as an Oauth bot. It is used to perform operations as the specified user
          required: false
          schema:
            type: string
      requestBody:
        description: The question to ask Copilot and other parameters.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CopilotAskRequest'
        required: true
      responses:
        '200':
          description: |
            Data will be returned in SSE format

            If any error occurs, the response will have the following error codes:

            | Code   |   Error |
            | :-------- | :-------- |
            | 409 | Exceed copilot usage quota. Premise deployment has no usage quota limitation |
            | 510 | Generic Copilot error |
            | 511 | No Copilot license |
            | 512 | Copilot is not installed |
            | 513 | Invalid request parameters, refer to the error message for details |
            | 601 | Authorization error when calling external AI services |
            | 602 | Exceed quota error when calling external AI services  |
            | 604 | Cannot connect to external AI services |
            | 605 | Permission denied when calling external AI Services |
          content:
            text/event-stream:
              schema:
                $ref: '#/components/schemas/CopilotAskResponse'
        '401':
          description: Returned if the authentication credentials are incorrect or missing.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadResponse401'
        '403':
          description: Returns if the scope check fails.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadResponse403'
        '404':
          description: Returned if the resource object was not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadResponse404'
        '500':
          description: Internal Server Error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadResponse500'
