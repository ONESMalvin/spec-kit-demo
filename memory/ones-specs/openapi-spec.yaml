components:
  schemas:
    AppLicenseDetail:
      type: object
      properties:
        result:
          type: string
          description: The result of this request.
        errorCode:
          type: string
          description: The error code of this request.
        errorMsg:
          type: string
          description: Error message for this request.
        errorData:
          type: object
          description: Error meta data for this request.
        data:
          type: array
          items:
            type: object
            properties:
              appID:
                type: string
                description: Application ID
              policy:
                type: object
                description: Sales policy
                properties:
                  policy:
                    type: string
                    description: Sales policy
                    enum:
                      - standard
                      - simple
                      - org_scale
                      - full_binding
                  target:
                    type: string
                    description: Dependent application (when policy value is full_binding, it means this application's authorization is bound to the target application)
              scale:
                type: number
                description: Authorizable scale (number of people)
              usage:
                type: string
                description: Authorized scale (number of people)
          example:
            - appID: wiki
              policy:
                policy: standard
                target: ''
              scale: 100
              usage: 3
            - appID: xmind
              policy:
                policy: full_binding
                target: wiki
              edition: enterprise
              scale: 100
              usage: 3
    GrantResponse:
      type: object
      properties:
        result:
          type: string
          description: The result of this request.
        errorCode:
          type: string
          description: |
            error code
            <table>
              <tr>
                <td>InvalidParameter</td>
                <td>invalid parameter</td>
              </tr>
              <tr>
                <td>MissingParameter</td>
                <td>missing parameter</td>
              </tr>
              <tr>
                <td>PermissionDenied</td>
                <td>no permission</td>
              <tr>
              <tr>
                <td>NotFoundUser</td>
                <td>user not found</td>
              </tr>
              <tr>
                <td>NotFoundApp</td>
                <td>app not found</td>
              </tr>
              <tr>
                <td>NotFoundAppLicenseOrExpired</td>
                <td>app license not found or license expired</td>
              </tr>
              <tr>
                <td>LicenseLimited</td>
                <td>license limit</td>
              </tr>
              <tr>
                <td>UnsupportedGrant</td>
                <td>grant for the app is unsupported</td>
              </tr>
            </table>
        errorMsg:
          type: string
          description: Error message for this request.
        errorData:
          type: object
          description: Error meta data for this request.
    BadResponse500:
      description: Internal Server Error
      type: object
      properties:
        result:
          type: string
          description: The result of this request.
          example: FAIL
        errorCode:
          type: string
          description: The error code of this request.
          example: InternalServerError
        errorMsg:
          type: string
          description: Error message for this request.
          example: Internal server error
        errorData:
          type: object
          description: Error meta data for this request.
      example:
        result: FAIL
        errorCode: Internal Server Error
        errorMsg: Internal Server Error
    BadResponse401:
      description: Access token is invalid
      type: object
      properties:
        result:
          type: string
          description: The result of this request.
          example: FAIL
        errorCode:
          type: string
          description: The error code of this request.
          example: Unauthorized
        errorMsg:
          type: string
          description: Error message for this request.
          example: Authentication credentials are incorrect or missing
        errorData:
          type: object
          description: Error meta data for this request.
      example:
        result: FAIL
        errorCode: Unauthorized
        errorMsg: Access token is invalid
    BadResponse403:
      description: Scope is invalid
      type: object
      properties:
        result:
          type: string
          description: The result of this request.
          example: FAIL
        errorCode:
          type: string
          description: The error code of this request.
          example: Forbidden
        errorMsg:
          type: string
          description: Error message for this request.
          example: Insufficient permissions
        errorData:
          type: object
          description: Error meta data for this request.
      example:
        result: FAIL
        errorCode: Forbidden
        errorMsg: Scope is invalid
    BadResponse404:
      description: Not Found
      type: object
      properties:
        result:
          type: string
          description: The result of this request.
          example: FAIL
        errorCode:
          type: string
          description: The error code of this request.
          example: NotFound
        errorMsg:
          type: string
          description: Error message for this request.
          example: Resource not found
        errorData:
          type: object
          description: Error meta data for this request.
      example:
        result: FAIL
        errorCode: NotFound
        errorMsg: Not Found
    ApplyTokenSuccessResponse:
      type: object
      properties:
        access_token:
          type: string
          description: The "Access token" (valid for 1 day).
        refresh_token:
          type: string
          description: The "Refresh token" used to refresh the access token (valid for 30 days).
        expires_in:
          type: integer
          description: The expiration time of the access token, measured in seconds.
        scope:
          type: string
          description: The Open API scopes that the OAuth application can access, separated by commas.
        token_type:
          type: string
          description: The type of access token.
        user_id:
          type: string
          description: The bot ID of the access token.
        email:
          type: string
          description: The bot email of the access token.
    AccessTokenResponse:
      type: object
      properties:
        active:
          type: boolean
          description: Whether the access token is valid/usable.
        sub:
          type: string
          description: The user ID of the access token.
        scope:
          type: string
          description: The Open API scopes that are accessible, separated by commas.
        client_id:
          type: string
          description: The identifier of the OAuth application.
        token_type:
          type: string
          description: The type of access token.
        exp:
          type: integer
          description: The expiration time of the access token.
        org_id:
          type: string
          description: The organization ID of the created OAuth application.
    BadResponse:
      type: object
      properties:
        error:
          type: string
          description: The error message for the current request.
        error_description:
          type: string
          description: The detailed error information for the current request.
        code:
          type: integer
          description: HTTP status code of the current response.
        errcode:
          type: integer
          description: Error code of the current response.
        type:
          type: string
          description: Error type of the current response.
        model:
          type: string
          description: Error module of the current response.
        field:
          type: string
          description: Error project of the current response.
        reason:
          type: string
          description: Error reason of the current response.
    CreateConvertTaskResponse:
      type: object
      properties:
        result:
          type: string
          description: The result of this request.
        errorCode:
          type: string
          description: The error code of this request.
        errorMsg:
          type: string
          description: Error message for this request.
        errorData:
          type: object
          description: Error meta data for this request.
        data:
          type: object
          properties:
            id:
              type: string
              description: Task ID
    GetConvertTaskResponse:
      type: object
      properties:
        status:
          type: string
          description: Task status
          enum:
            - Pending
            - Processing
            - Success
            - Failed
        message:
          type: string
          description: Task text information
          nullable: true
        file:
          type: object
          description: Task result file
          nullable: true
          properties:
            name:
              type: string
              description: File name
            size:
              type: integer
              description: File size
              format: int64
            expireAt:
              type: integer
              description: File expiration time
              format: int64
        data:
          type: object
          description: Task extra information
          nullable: true
    CopilotAskRequest:
      type: object
      oneOf:
        - type: object
          description: start a new Copilot ask request.
          properties:
            scopeType:
              type: string
              enum:
                - global
                - space
                - page
                - attachment
              description: the type of scopeID, default is global
            scopeID:
              type: string
              description: the ID of the pre-defined scopeType, may be SpaceID, PageID or AttachmentID. When scopeType is global, it is not required.
            query:
              type: string
              description: (Required.) The question/request sent to Copilot.
            language:
              type: string
              description: The output language of the response, default is current user's language. The value should be a valid English name of the language, such as "Chinese", "English", "Japanese", etc.
            generateRelatedQuestions:
              type: boolean
              description: Whether to generate related questions, default is true.
            config:
              type: object
              description: configurations to run the ask request
              properties:
                expandQuery:
                  type: boolean
                  description: Whether to expand the query before searching the vector database. Query expansion will make the result more relevant, but may increase latency. For this options to work, the LLM models must support structured data generation. Default value for reasoning model is false, for other models is true.
                enableCache:
                  type: boolean
                  description: Whether to enable cache for the ask request. Default is true.
        - type: object
          description: continue a Copilot ask request, the requestID is required.
          properties:
            query:
              type: string
              description: (Required.) The question/request sent to Copilot.
            conversationID:
              type: string
              description: (Required.) The ID of the conversation to continue, required when continuing a Copilot ask request.
    CopilotAskResponse:
      type: object
      oneOf:
        - type: object
          description: step type response, indicating the current step of the Copilot process.
          properties:
            type:
              type: string
              enum:
                - step
            step:
              type: string
              enum:
                - embedding
                - searching
                - reranking
                - thinking
                - generating
        - type: object
          description: Reasoning process response. Only returned when the COpilot is configured with a reasoning model.
          properties:
            type:
              type: string
              enum:
                - reasoning
            reasoning:
              type: string
              description: The reasoning token from Copilot.
            reasoningTimeCost:
              type: integer
              description: The time cost of the reasoning process in milliseconds.
        - type: object
          description: Answer/response process.
          properties:
            type:
              type: string
              enum:
                - generating
            content:
              type: string
              description: The content of the response from Copilot.
        - type: object
          description: Related questions response.
          properties:
            type:
              type: string
              enum:
                - relatedQuestions
            questions:
              type: array
              items:
                type: string
              description: The related questions generated by Copilot.
        - type: object
          description: Generation end response.
          properties:
            type:
              type: string
              enum:
                - generationEnd
            content:
              type: string
              description: The full content of the response from Copilot.
            reasoning:
              type: string
              description: The full reasoning content from Copilot, if available.
            reasoningTimeCost:
              type: integer
              description: The total time cost of the reasoning process in milliseconds, if applicable.
            references:
              type: array
              description: The references used in the response, the first one is referenced in response as [info1], the second one is referenced as [info2], and so on.
              items:
                type: object
                properties:
                  contentType:
                    type: string
                    description: The type of content, such as 'page' or 'media' or 'attachment'.
                    enum:
                      - page
                      - media
                      - attachment
                  itemID:
                    type: string
                    description: The ID of the item, such as PageID or AttachmentID.
                  fileName:
                    type: string
                    description: The name of the file, if contentType is 'media'
            attachments:
              type: array
              description: The attachment information used in references
              items:
                type: object
                properties:
                  name:
                    type: string
                    description: The name of the attachment.
                  pageName:
                    type: string
                    description: The name of the page where the attachment is located.
                  pageID:
                    type: string
                    description: The ID of the page where the attachment is located.
                  spaceID:
                    type: string
                    description: The ID of the space where the page is located.
                  ID:
                    type: string
                    description: The ID of the attachment. Used by reference itemID to identify the attachment.
            pages:
              type: array
              description: The page information used in references
              items:
                type: object
                properties:
                  name:
                    type: string
                    description: The title of the page.
                  ID:
                    type: string
                    description: The ID of the page. Used by reference itemID to identify the page.
                  spaceID:
                    type: string
                    description: The ID of the space where the page is located.
                  spaceName:
                    type: string
                    description: The name of the space where the page is located.
        - type: object
          description: End response.
          properties:
            type:
              type: string
              enum:
                - end
