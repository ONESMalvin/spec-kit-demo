  /openapi/v2/wiki/pages:
    post:
      tags:
        - page
      summary: Create page
      operationId: 04-create-page
      description: |
        ## History

        | Version   |   Changes |
        | :-------- | :-------- |
        | v6.12.0  | Added in: v6.12.0 |

        Create page.

        | Page Type | &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;content&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; | cards | attachments | resources | attachmentOrResourceFileUUID |
        | ------- | ----------- | ----------- | ----------- | ----------- | ----------- |
        | collaboration | Yes. The content is collaboration. json(Reference: **[Document Data Structure](../../business-knowledge/wiki/wiz-editor/doc-json/)**) | Yes | Yes | Yes | Yes |

        Sample curl request:
        ```curl
        curl --location --request POST 'https://your-domain/openapi/v2/wiki/pages?teamID=<teamID>' \
        --header 'Authorization: Bearer <TOKEN>' \
        --form 'parentPageID="<ParentPageID>"' \
        --form 'title="open api from form-data"' \
        --form 'attachments="[\"attachmentRandomId\"]"' \
        --form 'attachmentRandomId=@"your-attachment-file"' \
        --form 'resources="[\"resourceRandomId\"]"' \
        --form 'resourceRandomId=@"your-resource-file"' \
        --form 'cards="[{\"type\": \"attachment\", \"config\": [\"attachmentRandomId\"], \"id\": \"cardRandomId\"}]"' \
        --form 'content="{
          \"blocks\": [
            {
              \"id\": \"fkpFQHTFP\",
              \"type\": \"text\",
              \"text\": [
                {
                  \"insert\": \"open api from form-data\"
                }
              ],
              \"heading\": 1,
              \"quoted\": false
            },
            {
              \"id\": \"zrzebX_5P\",
              \"type\": \"text\",
              \"text\": [
                {
                  \"insert\": \"资源\"
                }
              ],
              \"heading\": 2
            },
            {
              \"id\": \"bBb4SGK_9\",
              \"type\": \"text\",
              \"text\": [
                {
                  \"insert\": \"embedData 里面的 src 是资源随机 ID。上传文件的 key 和此 ID 相同，value 是具体的资源文件。\"
                }
              ]
            },
            {
              \"id\": \"Nckftr1QB\",
              \"type\": \"embed\",
              \"embedType\": \"image\",
              \"align\": \"left\",
              \"embedData\": {
                \"src\": \"resourceRandomId\",
                \"widthPercent\": 41.83070866141732,
                \"8c8d4fa06483a35dffa314ec88fad792_width\": 425,
                \"8c8d4fa06483a35dffa314ec88fad792_height\": 307,
                \"0_flex\": 1
              }
            },
            {
              \"id\": \"hYtCamqSj\",
              \"type\": \"text\",
              \"text\": [
                {
                  \"insert\": \"附件卡片\"
                }
              ],
              \"heading\": 2
            },
            {
              \"id\": \"DWkP4GVAF\",
              \"type\": \"text\",
              \"text\": [
                {
                  \"insert\": \"embedData 里面的 cardUuid 是卡片随机 ID。cards 列表中的 ID 和此 ID 相同。卡片包含哪些卡片，也是由 cards 列表中的 attachments 决定。attachments 列表中的 ID 是附件随机 ID。上传文件中的 key 和此 ID 相同，value 是具体的附件文件。\"
                }
              ]
            },
            {
              \"id\": \"fadFDWnZY\",
              \"type\": \"embed\",
              \"embedType\": \"file-list\",
              \"embedData\": {
                \"cardUuid\": \"cardRandomId\"
              }
            },
            {
              \"id\": \"PNWe0PcC7\",
              \"type\": \"text\",
              \"text\": []
            }
          ]
        }"'
        ```
      security:
        - oauth2:
            - write:wiki:page
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                parentPageID:
                  type: string
                  description: (Required.) The parent page ID
                title:
                  type: string
                  description: (Required.) The page title
                content:
                  type: string
                  description: |
                    The content of page
                cards:
                  type: array
                  description: The card list
                  items:
                    type: object
                    properties:
                      id:
                        type: string
                        description: The card ID
                      type:
                        type: string
                        description: The card type
                        enum:
                          - attachments
                      config:
                        type: object
                        description: The card configuration
                        oneOf:
                          - type: object
                            properties:
                              attachments:
                                type: array
                                description: The attachment ID list
                                items:
                                  type: string
                                  format: uuid
                attachments:
                  type: array
                  description: The attachment ID list
                  items:
                    type: string
                    format: uuid
                resources:
                  type: array
                  description: The resource ID list
                  items:
                    type: string
                    format: uuid
                attachmentOrResourceFileUUID:
                  type: string
                  format: binary
                  description: |
                    The key is not a fixed value. It is the ID of the resource or attachment, and the value is the file.
      responses:
        '200':
          description: Request is successful.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageSimple'
        '401':
          description: Returned if the authentication credentials are incorrect or missing.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadResponse401'
        '403':
          description: Returns if the scope check fails.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadResponse403'
        '404':
          description: Returned if the resource object was not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadResponse404'
        '500':
          description: Internal Server Error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadResponse500'
