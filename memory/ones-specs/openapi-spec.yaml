      summary: Get a list of issue fields change log
      operationId: 03-get-a-list-of-issue-field-change-log
      description: |
        Get a list of issue fields change log
        ## History                     
        | Version   |   Changes |
        | :-------- | :-------- |
        | v6.0.57  | Added in: v6.0.57  |
        ## Unsupported issue field type for query
        | Issue field type   |  
        | :-------- | 
        | Time of appearance  | 
        | Interval time  | 
        | Frequency in status  | 
        | Time in status  | 
        | Issue No.  | 
        ## Unsupported system issue field for query
        | Issue field ID  |  
        | :-------- | 
        | Creator  |
        | Time of creation  |
        | ID  |
        | Release progress  |
        | Working time progress  |
        | Deviation  |
        | Overall working time progress  |
        | Total Remaining Time  |
        | Total Logged Time  |
        | Total Estimated Time  |
        | Estimation Deviation  |
        ## System issue field
        | Issue field ID |  Issue field type            | Description               |
        | :-------- |  :-------------- | :--------------------- |
        | field001  |  text            | Title                   |
        | field002  |  text            | Description                   |
        | field004  |  user            | Assigner                 |
        | field005  |  task_status     | Issue status                   |
        | field006  |  project         | Project               |
        | field007  |  issue_type      | Issue type             |
        | field008  |  user_list       | Watcher                |
        | field010  |  integer         | Updated time               |
        | field011  |  sprint          | Sprint            |
        | field012  |  option          | Priority                 |
        | field013  |  date            | Due date               |
        | field018  |  float           | Time estimated               |
        | field019  |  float           | Time spent         |
        | field020  |  float           | Time remaining               |
        | field021  |  issue_type      | Sub issue type           |
        | field027  |  date            | Planned start date           |
        | field028  |  date            | Planned end date           |
        | field029  |  product         | Product（multi_option）     |
        | field030  |  product_module  | Product module（multi_option） |
        | field031  |  option          | Found in production |
        | field032  |  float           | Story point     |
        | field033  |  float           | Progress                   |
        | field036  |  date            | Release date                   |
        | field038  |  option          | Severity                   |
        | field039  |  option          | Result                   |
        | field040  |  user            | Solver                   |
        | field041  |  option          | Bug type                   |
        ## System issue field type
        | Issue field type            | Enum | Type | Description                                                            |
        | :-------------- | :--------- | :----- | :-------------------------------------------------------------- |
        | option | 1 | string | Option, the value is the currently selected option ID |
        | text | 2 | string | Text |
        | integer | 3 | int | Integer, value = actual value x 100000 |
        | float | 4 | int | Float, value = floor(actual value x 100000), 5 decimal places |
        | date | 5 | int | Date, UTC timestamp, in seconds |
        | time | 6 | int | Time, UTC timestamp, in seconds |
        | sprint | 7 | string | Sprint, the value is the sprint ID |
        | user | 8 | string | Team member, the value is the user ID |
        | project | 9 | string | Project, the value is the project ID |
        | task | 10 | string | Work item, the value is the work item ID |
        | issue_type | 11 | string | Issue type, the value is the issue type ID |
        | task_status | 12 | string | Work item status, the value is the work item status ID |
        | user_list | 13 | array | User list, the values are user IDs |
        | multi_line_text | 15 | string | Multi-line text |
        | multi_option | 16 | array | Multiple options, the values are the selected option IDs |
        | publish_Version | 49 | array | Related releases, the values are release IDs |
        | project_list | 50 | array | Multiple projects, the values are project IDs |
        | department | 52 | array | Multiple departments, the values are department IDs |
