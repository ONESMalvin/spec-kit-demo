openapi: 3.0.1
info:
  title: ONES OpenAPI
  version: '2.0'
  description: ONES Open Platform OpenAPI Specification Document
servers:
  - url: https://{domain}
    variables:
      domain:
        default: your-domain
  - url: http://{domain}
    variables:
      domain:
        default: your-domain
paths:
  /openapi/v2/appcenter/apps/installedLicenseApps:
    get:
      tags:
        - app
      summary: Get the list of licensed apps installed.
      operationId: 01-get-app-installed-license-app
      description: |
        Get the list of licensed apps installed(requires organizational administrator permissions)
        ## History                     
        | Version   |   Changes |
        | :-------- | :-------- |
        | v6.0.?  | Added in: v6.0.? |
      security:
        - oauth2:
            - read:appcenter:app
      responses:
        '200':
          description: Request successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppLicenseDetail'
        '401':
          description: Returned if the authentication credentials are incorrect or missing.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadResponse401'
        '403':
          description: Returns if the scope check fails.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadResponse403'
        '404':
          description: Returned if the resource object was not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadResponse404'
        '500':
          description: Internal Server Error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadResponse500'
  /openapi/v2/appcenter/apps/grantUser:
    post:
      tags:
        - app
      summary: Grant Application for an individual user.
      operationId: 02-app-grant-user
      description: |
        Grant Application for an individual user(requires organizational administrator permissions)
        ## History                     
        | Version   |   Changes |
        | :-------- | :-------- |
        | v6.0.？  | Added in: v6.0.？ |
      security:
        - oauth2:
            - write:appcenter:user
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - appIDs
                - userID
              properties:
                userID:
                  description: user's id
                  type: string
                appIDs:
                  description: list of app ids
                  type: array
                  items:
                    type: string
                  example:
                    - project
                    - wiki
                    - performance
      responses:
        '200':
          description: Request successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GrantResponse'
        '401':
          description: Returned if the authentication credentials are incorrect or missing.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadResponse401'
        '403':
          description: Returns if the scope check fails.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadResponse403'
        '404':
          description: Returned if the resource object was not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadResponse404'
        '500':
          description: Internal Server Error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadResponse500'
  /oauth2/authorize:
    get:
      tags:
        - auth
      summary: Apply for authorization code
      operationId: apply-for-authorization-code
      description: |
        Apply for authorization code.

        ## History

        | Version   |   Changes |
        | :-------- | :-------- |
        | v3.14.117, v3.15.26  | Added in: v3.14.117, v3.15.26 |
      parameters:
        - name: client_id
          required: true
          in: query
          description: Client ID obtained from creating an OAuth application.
          schema:
            type: string
        - name: response_type
          required: true
          in: query
          description: Fixed value:code.
          schema:
            type: string
        - name: redirect_uri
          in: query
          description: The Redirect URI configured when creating the OAuth application, to which the user will be redirected with the authorization code after granting consent.
          schema:
            type: string
        - name: scope
          in: query
          description: A comma-separated list of scopes, which must be a subset of the scopes configured when creating the OAuth application. By default, the scopes configured when creating the OAuth application are used.
          schema:
            type: string
        - name: state
          in: query
          description: A random string that the client uses to maintain state between the request and callback, which will ultimately be returned as is.
          schema:
            type: string
      responses:
        '302':
          description: Redirect to the Redirect URI, and add the code and state parameters to the URL parameters.
        '400':
          description: Invalid request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadResponse'
        '401':
          description: If the authorization type is incorrect, then return.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadResponse'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadResponse'
  /oauth2/token:
    post:
      tags:
        - auth
      summary: Apply for or refresh access token
      operationId: apply-for-or-refresh-access-token
      description: |
        Apply for or refresh access token.

        ## History

        | Version   |   Changes |
        | :-------- | :-------- |
        | v3.14.117, v3.15.26  | Added in: v3.14.117, v3.15.26 |
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                client_id:
                  type: string
                  description: The Client ID obtained from creating an OAuth application, which needs to be assigned when applying for or refreshing an access token.
                client_secret:
                  type: string
                  description: The Client Secret obtained from creating an OAuth application, which needs to be assigned when applying for an access token.
                code:
                  type: string
                  description: Authorization code, which needs to be assigned when applying for an access token.
                redirect_uri:
                  type: string
                  description: The Redirect URI configured when creating an OAuth application. It is not mandatory, but can be assigned when applying for an access token.
                grant_type:
                  type: string
                  enum:
                    - authorization_code
                    - refresh_token
                  description: authorization_code,chosen when requesting an access token. refresh_token,chosen when refreshing an access token.
                refresh_token:
                  type: string
                  description: Refresh token, which needs to be assigned when refreshing an access token.
      responses:
        '200':
          description: Request successful.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplyTokenSuccessResponse'
        '400':
          description: Invalid request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadResponse'
        '401':
          description: If the authentication credentials are incorrect or missing, it will return.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadResponse'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadResponse'
  /oauth2/introspect:
    get:
      tags:
        - auth
      summary: Get access token details
      operationId: get-access-token-details
      description: |
        Get access token details.

        ## History

        | Version   |   Changes |
        | :-------- | :-------- |
        | v3.14.117, v3.15.26  | Added in: v3.14.117, v3.15.26 |
      parameters:
        - in: header
          name: Authorization
          required: true
          schema:
            type: string
            description: Access token.
      responses:
        '200':
          description: Request successful.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessTokenResponse'
        '400':
          description: Invalid request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadResponse'
        '401':
          description: If the authentication credentials are incorrect or missing, then return.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadResponse'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadResponse'
  /oauth2/revoke:
    post:
      tags:
        - auth
      summary: Revoke access token
      operationId: revoke-access-token
      description: |
        Revoke access token.

        ## History

        | Version   |   Changes |
        | :-------- | :-------- |
        | v3.14.117, v3.15.26  | Added in: v3.14.117, v3.15.26 |
      requestBody:
        content:
          application/json:
            schema:
              required:
                - client_id
                - client_secret
                - access_token
              type: object
              properties:
                client_id:
                  type: string
                  description: The "Client ID" obtained from creating an OAuth application.
                client_secret:
                  type: string
                  description: The "Client Secret" obtained from creating an OAuth application.
                access_token:
                  type: string
                  description: Access token.
      responses:
        '200':
          description: Request successful.
        '400':
          description: Invalid request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadResponse'
        '401':
          description: If the authentication credentials are incorrect or missing, then return.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadResponse'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadResponse'
  /openapi/v2/wiki/convert/tasks:
    post:
      tags:
        - convert
      summary: Create a task
      operationId: 01-create-convert-task
      description: |
        ## History

        | Version | Changes |
        | ------- | ----------- |
        | v6.15.0     | Added in v6.15.0 |

        Create an import or export task.

        Different page types support different export formats, as follows:
        | Page Type | Export Format |
        | ------- | ----------- |
        |  default   | pdf,docx       |
        | collaboration | pdf,png,markdown |
        | word | pdf,docx |
        | excel | pdf,xlsx |
        | ppt | pdf,pptx |
        | collaborationPlugin | No restrictions, the supported formats are defined by the plugin |
      security:
        - oauth2:
            - write:wiki:page
      parameters:
        - name: teamID
          in: query
          description: The team ID
          required: true
          schema:
            type: string
        - name: requestUserID
          in: query
          description: User ID, this parameter can only be passed when calling as an Oauth bot. It is used to perform operations as the specified user
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                taskType:
                  type: string
                  description: Task type
                  enum:
                    - ExportPage
                payload:
                  type: object
                  description: Task parameters
                  oneOf:
                    - type: object
                      properties:
                        pageID:
                          type: string
                          description: Page ID
                        format:
                          type: string
                          description: Export format
                          enum:
                            - pdf
                            - png
                            - docx
                            - xlsx
                            - pptx
                            - markdown
                        hideTitle:
                          type: boolean
                          description: Whether to hide the title, valid when the format is png
                        width:
                          type: integer
                          description: Image width, valid when the format is png
                          default: 1280
                          maximum: 2560
                        height:
                          type: integer
                          description: Image height, valid when the format is png
                          default: 800
                          maximum: 1600
      responses:
        '200':
          description: Create successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateConvertTaskResponse'
        '401':
          description: Returned if the authentication credentials are incorrect or missing.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadResponse401'
        '403':
          description: Returns if the scope check fails.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadResponse403'
        '404':
          description: Returned if the resource object was not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadResponse404'
        '500':
          description: Internal Server Error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadResponse500'
